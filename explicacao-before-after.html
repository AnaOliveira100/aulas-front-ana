<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* pseudo-elementos */
        h1::before{
            content: "💡";
        }

        h1::after {
            content: "🤘";
        }
    </style>
</head>
<body>
    <h1>💡Exemplo🤘</h1>
    
</body>
</html>
