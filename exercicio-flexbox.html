<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercicio flexbox</title>

    
    
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        
        body, h1, h2, header p {
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: system-ui, sans-serif;
            color: black
            background-color #f5f5f5
        }
        
        header{
            display: flex;
            text-align: center;
            justify-content: center;
            align-items: center;
            background-color: aqua;
            gap: 100px;
            padding-block: 30px;
            
        }
        
        
        nav {
            background-color:yellow;
            border-block-end: solid 1px;     
            display: flex;
            padding: 10px;
            justify-content: center;
            align-items: center;
            gap: 50px;
            flex-direction: row;
            
            a {
                text-decoration: none;
                color: #222;
                font-weight: bold;
                &:hover, &:focus {
                    color: rgb(128, 192, 229);
                }
            }
        }
        
        .cards {
            
            display: flex;
            justify-content: center;
            align-items: center;
            /*align-items: center; dar espaço entre os card */
            /*align-content: flex-start; diminuir espaçamento card*/
                      
            gap: 1.2rem;
            margin-block-start: 2rem;
            background-color: #e77b68;
            height: 600px;
            flex-wrap: wrap;
            /* padding-block-start: 10px */
            padding-block-start: 10px;
        
        }
        
        .card {
            width: 250px;
            height: 200px;
            width: 250px;
            padding: 1rem;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.594) 0 0 10px;
            border-radius: 4px;
        }
        
        
        </style>
</head>


<body>
    
    <header>
        <h1>Exercicio Flexbox</h1>
            <nav>
        <a href="">Inicio</a>
        <a href="">Noticias</a>
        <a href="">Cursos</a>
        <a href="">Contato</a>
        </nav>
    </header>
    

    <main class="cards">
            <article class="card">
            <h2>HTML</h2>
            <p>Estrutura das paginas</p>
        </article>
        
        <article class="card">
            <h2>CSS</h2>
            <p>Estilo, layout e animação</p>
        </article>

        <article class="card">
            <h2>JS</h2>
            <p> Comportamento e Interatividade.</p>
        </article>

        <article class="card">
            <h2>JS</h2>
            <p> Comportamento e Interatividade.</p>
        </article>


    </main>
</body>

</html>
