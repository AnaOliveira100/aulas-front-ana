<!DOCTYPE html>
<html lang="pt.br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animação</title>
    <style>
        /* alternado o box model (*padding, width, height, border) */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        /*  regra de reset parcial */
        body,
        h1,
        h2,
        p {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, sans-serif;
            color: #222;
            background-color: #f5f5f5;
            animation-name: mudarCorFundo;
            animation-duration: 10s;
            animation-iteration-count: infinite;
            animation-direction: alternate;


        }

        nav {
            background-color: white;
            border-block-end: solid 1px;
            min-height: 80px;
            position: sticky;
            top: 0;

            /* habilitamos o modo flex
            sobre direção e iexos do flexbox a direção padrao e flex-direction: row nesse caso justify-content alinha os elementos no eixo main(horizontal) e o align-itens os elementos no eixo cross(vertical)
            se mudar a direçãpo para colimn(coluna) essa logica tambem e invertida: justify-content alinhara os elementos verticalmente e o align-itens alinhara os elementos horizontalmente */
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            flex-direction: row;
        }

        /* flex-diretion: column */



        nav a {
            text-decoration: none;
            color: #222;
            font-weight: bold;
            position: relative;
        }

        /*definimos o elemento contexto de posicionamento do pseudo elemoento after. ele serve como ancora*/


        nav a :hover,
        nav a :focus {
            color: darkblue;
        }

        nav a::after {
            content: "";
            background-color: red;
            width: 0;
            /*provisorio*/
            height: 4px;
            position: absolute;

            /*coordenadas*/
            bottom: -4px;
            left: 0;

            /*criaer uma transição amimada de largura*/
            transition: 1s;

        }

        /* coordenadas left, top, right, bottom */

        /*ao passar o mouse no link doi nav,modificar a largura do pseudo-elemento*/
        nav a:hover::after,
        nav a:focus::after {
            width: 100%
        }


        .hero {
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;

            a {
                text-decoration: none;
                background-color: #16a34a;
                color: white;
                padding: 0.5rem;
                border-radius: 8px;

                &:hover,
                &:focus {
                    background-color: #0f5c2c;

                }


            }


        }

        .banner {
            background-color: #facc15;
            text-align: center;
            padding: 1.2rem;
            font-weight: bold;
            margin-block: 1rem;
        }

        .cards {
            /* display: flex; */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            align-content: flex-start;

            /* alinha os itens de maneira agrupada precisa de espaço sucifnete para isso */
            gap: 1.2rem;
            margin-block-end: 2rem;
            background-color: #facc15;
            height: 600px;

            /* quebra o layour fazendo com que se nao houver espaço suficente os elementosw
         irão para baixo */
            flex-wrap: wrap;

        }

        .card {
            width: 250px;
            height: 200px;
            width: 250px;
            padding: 1rem;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.594) 0 0 10px;
            border-radius: 4px;
        }






        /*REGRAS DE ANIMAÇÃO
UTILIZAM UMA DIRETIVA ESPECIAL CHAMADA @KEYFRAMES CONTENDO UM NOME E SELETORES DE ANIMAÇÃO*/

        @keyframes mudarCorFundo {

            /*inicio*/
            from {
                background-color: rgb(173, 111, 165);
            }

            /*fim*/
            to {
                background-color: #63d8ff;
            }

            /*
0% { background-color: lightblue;}
25% {background-color: yellow;}
50% {background-color: purple;}
75% {background-color: pink;}
100% {background-color: lightgreen;}
*/
        }
h1 { 
    animation-name: subir;
    animation-duration: 2s;
    }


.hero p {
    animation-name: subir;
    animation-duration: 2s;
    animation-delay: 2s;


    /*ele aplica os estilos do primeiro keyframe antes da animação começar durante o tempo de animação-delay, se voce tiver um delay o elemento fica co estilo normal ate a animaçao começar.*/
    

    animation-fill-mode: backwards;
}


        @keyframes subir {
            from {
                opacity: 0;
                transform: translateY(30px);

            }
            to {
                opacity: 1;
                transform: translateY(0);
            }

        }
    </style>
</head>

<body>
    <!-- barra de navegaçao -->
    <nav>
        <a href="">Inicio</a>
        <a href="">Cursos</a>
        <a href="">Contato</a>
    </nav>

    <!--  hero ou cta seção chamada cta (call to action) -->
    <section class=" hero">
        <h1>Aprenda CSS do Zero</h1>
        <p>Layouts modernos com Flexbox</p>
        <p><a href="">Matricule-se ja!</a></p>
    </section>

    <!-- banner publicitario -->
    <div class="banner">
        Promoção: 50% off hoje!
    </div>

    <!--  Cards (cartoes) de conteudo -->
    <main class="cards">
        <article class="card">
            <h2>HTML</h2>
            <p>Estrutura das paginas</p>
        </article>

        <article class="card">
            <h2>CSS</h2>
            <p>Estilo, layout e animação</p>
        </article>

        <article class="card">
            <h2>JS</h2>
            <p> Comportamento e Interatividade.</p>
        </article>

    </main>

</body>

</html>
