<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício Flexbox</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        div { margin: 10px}

        body { font-family: Arial, sans-serif; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #8fe2f9;
            height: 150px;
        }

        nav {
            min-height: 50px;
            width: 70%;
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
            align-items: center;
            background-color: rgb(250, 250, 170);
        }

        nav a {
            text-decoration: none;
            color: black;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        main {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 30px;
        }

        article {
            width: 300px;
            padding: 20px;
            border: 1px solid #ccc;

            h2 { font-size: 2rem;}
            p { font-size: 1.4rem;}
        }
    </style>
</head>

<body>
    <header>
        <h1>Exercício Flexbox</h1>

        <nav>
            <a href="#">Início</a>
            <a href="#">Notícias</a>
            <a href="#">Cursos</a>
            <a href="#">Contato</a>
        </nav>
    </header>
    <main>
        <article>
            <h2>Nova IA no mercado</h2>
            <p>Tecnologia promete revolucionar o setor.</p>
        </article>

        <article>
            <h2>CSS moderno</h2>
            <p>Novos recursos chegam aos navegadores.</p>
        </article>

        <article>
            <h2>JavaScript 2026</h2>
            <p>Atualizações e melhores práticas.</p>
        </article>

        <article>
            <h2>Frameworks em alta</h2>
            <p>Quais tecnologias dominarão o mercado.</p>
        </article>
    </main>
</body>

</html>
